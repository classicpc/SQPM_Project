version: "3.4"

services:
  mongodb:
    image: docker.io/mongo:7.0
    restart: always
    ports:
      - "27017:27017"
    command: mongod --storageEngine wiredTiger --noscripting
    networks:
      default:
        aliases:
          - mongodb

  policies:
    image: docker.io/eclipse/ditto-policies:latest
    restart: always
    depends_on:
      - mongodb
    environment:
      - BIND_HOSTNAME=0.0.0.0
      - MONGO_DB_HOSTNAME=mongodb
    networks:
      default:
        aliases:
          - ditto-cluster

  things:
    image: docker.io/eclipse/ditto-things:latest
    restart: always
    depends_on:
      - policies
    environment:
      - BIND_HOSTNAME=0.0.0.0
      - MONGO_DB_HOSTNAME=mongodb
    networks:
      default:
        aliases:
          - ditto-cluster

  things-search:
    image: docker.io/eclipse/ditto-things-search:latest
    restart: always
    depends_on:
      - policies
    environment:
      - BIND_HOSTNAME=0.0.0.0
      - MONGO_DB_HOSTNAME=mongodb
    networks:
      default:
        aliases:
          - ditto-cluster

  connectivity:
    image: docker.io/eclipse/ditto-connectivity:latest
    restart: always
    depends_on:
      - policies
    environment:
      - BIND_HOSTNAME=0.0.0.0
      - MONGO_DB_HOSTNAME=mongodb
    networks:
      default:
        aliases:
          - ditto-cluster

  gateway:
    image: docker.io/eclipse/ditto-gateway:latest
    restart: always
    depends_on:
      - policies
    ports:
      - "8081:8080"
    environment:
      - BIND_HOSTNAME=0.0.0.0
      - ENABLE_PRE_AUTHENTICATION=true
      - MONGO_DB_HOSTNAME=mongodb
      - DEVOPS_PASSWORD=foobar
      - STATUS_PASSWORD=foobar
    networks:
      default:
        aliases:
          - ditto-cluster

  nginx:
    image: docker.io/nginx:1.27-alpine
    ports:
      - "8080:80"
    depends_on:
      - gateway
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx.htpasswd:/etc/nginx/nginx.htpasswd:ro
      - ./nginx-cors.conf:/etc/nginx/nginx-cors.conf:ro
